[global]
data_path = /path/to/some/output/folder/
#available estimators: bin, knn (if installed with `pip install .[alt]`), chatt, dchatt
estimator = bin
# effective connectivity: set to 0 for no effective connectivity (default), >=1 is the lag for the effective connectivity/embedding
# bin estimator: ignores effective connectivity
# chatt estimator: effective connectivity only 0 or 1
# dchatt estimator: effective connectivity >= 1
effectiveConnectivity = 0
uncorrected = False
random_seed = 42