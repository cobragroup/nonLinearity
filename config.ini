[global]
nbins = 9
display = False
workers = 2
dataset = boldEso190
outputFolder = ..

[estimate]
Nsurrogates = 99

[DEFAULT]
regions = 

[correction]
nsamples = 0
steps = 200
iters = 50000

; ADD HERE THE INFO FOR SPECIFIC HOSTS
; [dataset name]
; outputFolder = path/to/mat/file/if/not/the/default/one
; workers = # of workers to use

[ndw-workhorse-2]
outputFolder = /mnt/DATA/NonLinearMI/
workers = 12

[NB403303]
outputFolder = ..
workers = 4

; ADD HERE THE INFO FOR NEW DATASETS
; [dataset name]
; filePath = path/to/mat/file/if/not/the/default/one
; fileName = dataset.mat
; fieldName = dictionary key
; healthy_control_start = 64
; healthy_control_end = 0
; A 0 here means "from the beginning" or "until the end"

[MS_fMRI]
filePath = /mnt/DATA/NonLinearMI/
fileName = MS_fMRI.mat
fieldName = MS_fMRI
healthy_control_start = 64
healthy_control_end = 0

[boldEso190]
